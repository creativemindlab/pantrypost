<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d7a4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PantryPost">
  <title>PantryPost</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <span id="sync-indicator" title="Sincronizzato"></span>
    <h1>🥫 PantryPost</h1>
    <span class="header-subtitle" id="header-subtitle">Caricamento…</span>
  </header>

  <!-- Tab bar -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="dispensa">
      <span class="tab-icon">🏠</span>Dispensa
    </button>
    <button class="tab-btn" data-tab="lista-spesa">
      <span class="tab-icon">🛒</span>Lista spesa
    </button>
    <button class="tab-btn" data-tab="consumati">
      <span class="tab-icon">✅</span>Consumati
    </button>
    <button class="tab-btn" data-tab="ricette">
      <span class="tab-icon">👨‍🍳</span>Ricette
    </button>
  </nav>

  <!-- Content panels -->
  <main id="content">
    <section id="panel-dispensa"   class="tab-panel active"></section>
    <section id="panel-lista-spesa" class="tab-panel"></section>
    <section id="panel-consumati"  class="tab-panel"></section>
    <section id="panel-ricette"    class="tab-panel"></section>
  </main>

</div>

<!-- Modal overlay (shared, filled dynamically) -->
<div id="modal-overlay" class="modal-overlay"></div>

<!-- Toast -->
<div id="toast"></div>

<script type="module">
  import { loadData, initTabs, state } from './js/app.js';
  import { renderDispensa }  from './js/dispensa.js';
  import { renderListaSpesa } from './js/lista-spesa.js';
  import { renderConsumati } from './js/consumati.js';
  import { renderRicette }   from './js/ricette.js';

  const renderFns = {
    'dispensa':    renderDispensa,
    'lista-spesa': renderListaSpesa,
    'consumati':   renderConsumati,
    'ricette':     renderRicette,
  };

  async function boot() {
    await loadData();

    const subtitle = document.getElementById('header-subtitle');
    subtitle.textContent = `${state.pantry.length} prodotti`;

    initTabs(renderFns);
    renderDispensa(); // tab iniziale
  }

  boot();
</script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }
</script>

</body>
</html>
